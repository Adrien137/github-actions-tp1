name: Deploy Azure

on:
  workflow_dispatch:
  push:
    branches: [ main, develop ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Build Docker image
        run: docker build -t task-api:${{ github.sha }} .

      - name: Push image to Azure Container Registry
        run: |
          az acr login --name ${{ secrets.ACR_NAME }}
          docker tag task-api:${{ github.sha }} ${{ secrets.ACR_LOGIN_SERVER }}/task-api:${{ github.sha }}
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/task-api:${{ github.sha }}

      - name: Deploy container to Azure Web App
        run: |
          az webapp config container set \
            --name ${{ secrets.AZURE_WEBAPP_NAME }} \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --docker-custom-image-name ${{ secrets.ACR_LOGIN_SERVER }}/task-api:${{ github.sha }} \
            --docker-registry-server-url https://${{ secrets.ACR_LOGIN_SERVER }}
